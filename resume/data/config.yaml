# ---------------------------------------------------------------------------
# Configuration for the Markdown -> PDF resume pipeline.
# Everything here is presentation. Content lives in resume.md.
# ---------------------------------------------------------------------------

page:
  # US Letter. Use "595pt 842pt" for A4.
  size: "612pt 792pt"
  # top right bottom left
  margin: "34pt 52.9pt 36pt 50.4pt"

# Anything under `style` is injected verbatim as CSS custom properties on
# :root, so style.css can reference them via var(). Add/override freely.
style:
  "--font-family": '"Nimbus Sans", "Helvetica Neue", Helvetica, "Liberation Sans", Arial, sans-serif'
  "--base-size": "11pt"
  "--line-height": "14pt"
  "--text-color": "#000000"
  "--para-margin": "4pt 0 0 0"

  # Name + contact block
  "--name-size": "22pt"
  "--name-line-height": "26pt"
  "--name-margin": "0 0 2pt 0"
  "--contact-margin": "0"

  # Links (contact + inline content) — [text](url) syntax; see README.
  "--link-color": "currentColor"
  "--link-decoration": "underline"

  # H1 - section headers (Summary, Experience, ...)
  "--h1-size": "10pt"
  "--h1-weight": "bold"
  "--h1-transform": "uppercase"
  "--h1-letter-spacing": "0.6pt"
  "--h1-margin": "11pt 0 4pt 0"
  "--h1-border": "0.75pt solid currentColor"
  "--h1-padding-bottom": "1.5pt"

  # H2 - role / entry titles
  "--h2-size": "11pt"
  "--h2-weight": "bold"
  "--h2-transform": "none"
  "--h2-margin": "11pt 0 0 0"

  # H3 - sub-headings (Product Achievements, ...)
  "--h3-size": "11pt"
  "--h3-weight": "bold"
  "--h3-transform": "none"
  "--h3-margin": "9pt 0 2pt 0"

  # italic meta line (company | dates | location)
  "--meta-margin": "0"

  # Bullets. The marker char is real text in the PDF, so it is also what
  # copy/paste and resume parsers see as the item prefix.
  "--bullet-char": '"\25CF"'   # ● ; e.g. "\2022" for a smaller bullet, "\2013" for an en-dash
  "--bullet-indent": "36pt"    # text column (ul padding); wrapped lines align here
  "--bullet-width": "18pt"     # marker column width, hangs left of the text column
  "--bullet-size": "7.5pt"
  "--bullet-nudge": "1.6pt"    # vertical-align: raises the (smaller) marker off the baseline
  "--list-margin": "2pt 0 0 0"
  "--li-margin": "0 0 3pt 0"
